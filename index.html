<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>ascii cam</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --border: #2a2a2a;
  --text: #c8c8c8;
  --muted: #555;
  --accent: #e8734a;
  --font: 'IBM Plex Mono', 'Courier New', monospace;
}

html, body {
  background: #000;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  height: 100%;
  overflow: hidden;
}

/* ---------- error overlay ---------- */
.error-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 10;
  background: rgba(0,0,0,0.85);
  color: var(--muted);
  font-size: 13px;
  letter-spacing: 0.08em;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.error-overlay.visible {
  display: flex;
}

/* ---------- bottom bar ---------- */
.bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 20;
  height: 40px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 14px;
  background: rgba(10, 10, 10, 0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.bar-left {
  flex-shrink: 0;
}

.logo {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  white-space: nowrap;
}

.logo span { color: var(--accent); }

.bar-center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  min-width: 0;
}

.bar-right {
  flex-shrink: 0;
  display: flex;
  gap: 6px;
}

/* ---------- controls ---------- */
select {
  background: rgba(10, 10, 10, 0.5);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font);
  font-size: 10px;
  padding: 4px 6px;
  -webkit-appearance: none;
  outline: none;
  max-width: 80px;
}

input[type=range] {
  -webkit-appearance: none;
  width: 60px;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  outline: none;
  flex-shrink: 1;
  min-width: 30px;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--text);
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb:active {
  background: var(--accent);
}

.val {
  font-size: 10px;
  color: var(--muted);
  min-width: 16px;
  text-align: right;
}

/* ---------- buttons ---------- */
.btn {
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: rgba(10, 10, 10, 0.4);
  color: var(--text);
  font-family: var(--font);
  font-size: 10px;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: border-color 0.1s, color 0.1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  white-space: nowrap;
  height: 28px;
}

.btn:active { background: var(--border); }

.btn.active {
  border-color: var(--accent);
  color: var(--accent);
}

/* hidden helpers */
#src-canvas, #feed { display: none; }

/* ---------- mobile ---------- */
@media (max-width: 600px) {
  .bar {
    height: auto;
    min-height: 40px;
    flex-wrap: wrap;
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom, 0px));
    gap: 8px;
  }

  .bar-left {
    order: 1;
  }

  .bar-center {
    order: 3;
    flex-basis: 100%;
    justify-content: flex-start;
  }

  .bar-right {
    order: 2;
    margin-left: auto;
  }

  input[type=range] {
    width: 50px;
    min-width: 30px;
  }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.min.js"></script>
</head>
<body>

<div class="error-overlay" id="error-overlay">camera access required</div>

<div class="bar">
  <div class="bar-left">
    <div class="logo">ascii<span>cam</span></div>
  </div>
  <div class="bar-center">
    <select id="charset-sel" title="charset">
      <option value="dense">dense</option>
      <option value="blocks">blocks</option>
      <option value="minimal">minimal</option>
    </select>
    <input type="range" id="cols-r" min="30" max="140" value="72" step="2" title="columns" />
    <span class="val" id="cols-v">72</span>
    <input type="range" id="sens-r" min="1" max="20" value="8" step="1" title="sensitivity" />
    <span class="val" id="sens-v">8</span>
  </div>
  <div class="bar-right">
    <button class="btn" id="btn-flip" style="display:none;">flip</button>
    <button class="btn" id="btn-color">mono</button>
    <button class="btn" id="btn-inv">inv</button>
    <button class="btn" id="btn-save">save</button>
  </div>
</div>

<canvas id="src-canvas"></canvas>
<video id="feed" playsinline muted autoplay></video>

<script>
const CHARSETS = {
  dense:  '@#S%?*+;:,. ',
  blocks: '█▓▒░ ',
  minimal:'@:. '
};

let cols = 72;
let colorMode = false;
let inverted = false;
let charset = CHARSETS.dense;
let glitchRate = 18;
let glitchRange = 2;
let facingMode = 'user';
let stream = null;
let animId = null;
let running = false;

let targetIdx = [], displayIdx = [], glitchTTL = [], charColors = [];
let numCols = 0, numRows = 0;

const feed     = document.getElementById('feed');
const srcCv    = document.getElementById('src-canvas');
const srcCtx   = srcCv.getContext('2d');
const outCv    = document.getElementById('out-canvas');
const outCtx   = outCv.getContext('2d');
const errorOverlay = document.getElementById('error-overlay');
const btnFlip  = document.getElementById('btn-flip');

function brightness(r,g,b){ return 0.299*r + 0.587*g + 0.114*b; }

function sampleFrame() {
  const sw = feed.videoWidth, sh = feed.videoHeight;
  if (!sw || !sh) return false;

  const videoAspect = sh / sw;
  numCols = cols;
  const cw = window.innerWidth / numCols;
  const fs = cw / 0.62;
  const ch = fs * 1.25;
  const maxRows = Math.max(1, Math.floor((window.innerHeight - document.querySelector('.bar').offsetHeight) / ch));
  numRows = Math.min(maxRows, Math.max(1, Math.round(numCols * videoAspect / (ch / cw))));

  srcCv.width  = numCols;
  srcCv.height = numRows;

  // mirror front camera
  if (facingMode === 'user') {
    srcCtx.save();
    srcCtx.translate(numCols, 0);
    srcCtx.scale(-1, 1);
    srcCtx.drawImage(feed, 0, 0, numCols, numRows);
    srcCtx.restore();
  } else {
    srcCtx.drawImage(feed, 0, 0, numCols, numRows);
  }

  const data = srcCtx.getImageData(0, 0, numCols, numRows).data;
  const n = numCols * numRows;

  if (targetIdx.length !== n) {
    targetIdx  = new Int32Array(n);
    displayIdx = new Int32Array(n);
    glitchTTL  = new Uint8Array(n);
    charColors = new Uint8Array(n * 3);
  }

  for (let i = 0; i < n; i++) {
    const d = i * 4;
    const r = data[d], g = data[d+1], b = data[d+2];
    let br = brightness(r,g,b) / 255;
    if (inverted) br = 1 - br;
    targetIdx[i] = Math.floor(br * (charset.length - 1));
    charColors[i*3]   = r;
    charColors[i*3+1] = g;
    charColors[i*3+2] = b;
  }
  return true;
}

function applyGlitch() {
  const n = numCols * numRows;
  for (let i = 0; i < n; i++) {
    if (glitchTTL[i] > 0) {
      glitchTTL[i]--;
      if (glitchTTL[i] === 0) displayIdx[i] = targetIdx[i];
    } else {
      displayIdx[i] = targetIdx[i];
      if (Math.random() * 1000 < glitchRate) {
        const dir = Math.random() < 0.5 ? 1 : -1;
        const steps = 1 + Math.floor(Math.random() * glitchRange);
        let ni = targetIdx[i] + dir * steps;
        ni = Math.max(0, Math.min(charset.length - 1, ni));
        displayIdx[i] = ni;
        glitchTTL[i] = 1 + Math.floor(Math.random() * 4);
      }
    }
  }
}

function drawFrame() {
  const W = window.innerWidth;
  const H = window.innerHeight - document.querySelector('.bar').offsetHeight;

  const cw = W / numCols;
  const fs = cw / 0.62;
  const ch = fs * 1.25;

  if (outCv.width !== W || outCv.height !== H) {
    outCv.width = W; outCv.height = H;
  }

  outCtx.fillStyle = '#000';
  outCtx.fillRect(0, 0, W, H);
  outCtx.font = `${fs}px monospace`;
  outCtx.textBaseline = 'top';

  const cs = charset;
  for (let row = 0; row < numRows; row++) {
    for (let col = 0; col < numCols; col++) {
      const i = row * numCols + col;
      const ci = displayIdx[i];
      const ch_char = cs[ci];
      if (!ch_char || ch_char === ' ') continue;

      const glitching = glitchTTL[i] > 0;
      if (colorMode) {
        const r = charColors[i*3], g = charColors[i*3+1], b = charColors[i*3+2];
        outCtx.fillStyle = glitching
          ? `rgb(${Math.min(255,r+50)},${g},${b})`
          : `rgb(${r},${g},${b})`;
      } else {
        const br = 1 - ci / (cs.length - 1);
        const lv = Math.round(br * 255);
        outCtx.fillStyle = glitching
          ? `rgb(${Math.min(255,lv+70)},${lv},${lv})`
          : `rgb(${lv},${lv},${lv})`;
      }
      outCtx.fillText(ch_char, col * cw, row * ch);
    }
  }
}

function loop() {
  animId = requestAnimationFrame(loop);
  if (!running) return;
  if (sampleFrame()) { applyGlitch(); drawFrame(); }
}

async function startCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  running = false;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width: { ideal: 640 } },
      audio: false
    });
    feed.srcObject = stream;
    await feed.play();
    running = true;
    const devices = await navigator.mediaDevices.enumerateDevices();
    const camCount = devices.filter(d => d.kind === 'videoinput').length;
    btnFlip.style.display = camCount > 1 ? '' : 'none';
    if (!animId) loop();
  } catch(e) {
    errorOverlay.classList.add('visible');
    console.error(e);
  }
}

btnFlip.addEventListener('click', () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  btnFlip.textContent = facingMode === 'user' ? 'flip' : 'rear';
  startCam();
});

document.getElementById('btn-color').addEventListener('click', function() {
  colorMode = !colorMode;
  this.textContent = colorMode ? 'color' : 'mono';
  this.classList.toggle('active', colorMode);
});

document.getElementById('btn-inv').addEventListener('click', function() {
  inverted = !inverted;
  this.textContent = inverted ? 'inv!' : 'inv';
  this.classList.toggle('active', inverted);
});

document.getElementById('btn-save').addEventListener('click', () => {
  if (!outCv.width) return;
  const a = document.createElement('a');
  a.href = outCv.toDataURL('image/png');
  a.download = 'ascii-cam.png';
  a.click();
});

document.getElementById('charset-sel').addEventListener('change', e => {
  charset = CHARSETS[e.target.value];
  targetIdx = [];
});

document.getElementById('cols-r').addEventListener('input', e => {
  cols = parseInt(e.target.value);
  document.getElementById('cols-v').textContent = cols;
  targetIdx = [];
});

document.getElementById('rate-r').addEventListener('input', e => {
  glitchRate = parseInt(e.target.value);
  document.getElementById('rate-v').textContent = glitchRate;
});

document.getElementById('range-r').addEventListener('input', e => {
  glitchRange = parseInt(e.target.value);
  document.getElementById('range-v').textContent = glitchRange;
});

document.addEventListener('DOMContentLoaded', () => { startCam(); });
</script>
</body>
</html>
