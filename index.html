<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>ascii cam</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0a0a0a;
  --border: #2a2a2a;
  --text: #c8c8c8;
  --muted: #555;
  --accent: #e8734a;
  --font: 'IBM Plex Mono', 'Courier New', monospace;
}

html, body {
  background: #000;
  color: var(--text);
  font-family: var(--font);
  font-size: 13px;
  height: 100%;
  overflow: hidden;
}

/* ---------- error overlay ---------- */
.error-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 10;
  background: rgba(0,0,0,0.85);
  color: var(--muted);
  font-size: 13px;
  letter-spacing: 0.08em;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.error-overlay.visible {
  display: flex;
}

/* ---------- bottom bar ---------- */
.bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 20;
  height: 40px;
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 14px;
  background: rgba(10, 10, 10, 0.6);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}

.bar-left {
  flex-shrink: 0;
}

.logo {
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--muted);
  text-transform: uppercase;
  white-space: nowrap;
}

.logo span { color: var(--accent); }

.bar-center {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  min-width: 0;
}

.bar-right {
  flex-shrink: 0;
  display: flex;
  gap: 6px;
}

/* ---------- controls ---------- */
select {
  background: rgba(10, 10, 10, 0.5);
  border: 1px solid var(--border);
  border-radius: 4px;
  color: var(--text);
  font-family: var(--font);
  font-size: 10px;
  padding: 4px 6px;
  -webkit-appearance: none;
  outline: none;
  max-width: 80px;
}

input[type=range] {
  -webkit-appearance: none;
  width: 60px;
  height: 2px;
  background: var(--border);
  border-radius: 1px;
  outline: none;
  flex-shrink: 1;
  min-width: 30px;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--text);
  cursor: pointer;
}

input[type=range]::-webkit-slider-thumb:active {
  background: var(--accent);
}

.val {
  font-size: 10px;
  color: var(--muted);
  min-width: 16px;
  text-align: right;
}

/* ---------- buttons ---------- */
.btn {
  padding: 5px 10px;
  border: 1px solid var(--border);
  border-radius: 4px;
  background: rgba(10, 10, 10, 0.4);
  color: var(--text);
  font-family: var(--font);
  font-size: 10px;
  letter-spacing: 0.04em;
  cursor: pointer;
  transition: border-color 0.1s, color 0.1s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
  white-space: nowrap;
  height: 28px;
}

.btn:active { background: var(--border); }

.btn.active {
  border-color: var(--accent);
  color: var(--accent);
}

/* hidden helpers */
#src-canvas, #feed { display: none; }

/* ---------- mobile ---------- */
@media (max-width: 600px) {
  .bar {
    height: auto;
    min-height: 40px;
    flex-wrap: wrap;
    padding: 8px 10px calc(8px + env(safe-area-inset-bottom, 0px));
    gap: 8px;
  }

  .bar-left {
    order: 1;
  }

  .bar-center {
    order: 3;
    flex-basis: 100%;
    justify-content: flex-start;
  }

  .bar-right {
    order: 2;
    margin-left: auto;
  }

  input[type=range] {
    width: 50px;
    min-width: 30px;
  }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.min.js"></script>
</head>
<body>

<div class="error-overlay" id="error-overlay">camera access required</div>

<div class="bar">
  <div class="bar-left">
    <div class="logo">ascii<span>cam</span></div>
  </div>
  <div class="bar-center">
    <select id="charset-sel" title="charset">
      <option value="dense">70-tone</option>
      <option value="blocks">blocks</option>
      <option value="minimal">minimal</option>
    </select>
    <input type="range" id="cols-r" min="30" max="300" value="160" step="2" title="columns" />
    <span class="val" id="cols-v">160</span>
    <input type="range" id="sens-r" min="1" max="20" value="8" step="1" title="sensitivity" />
    <span class="val" id="sens-v">8</span>
  </div>
  <div class="bar-right">
    <button class="btn" id="btn-flip" style="display:none;">flip</button>
    <button class="btn active" id="btn-color">color</button>
    <button class="btn" id="btn-inv">inv</button>
    <button class="btn" id="btn-save">save</button>
  </div>
</div>

<canvas id="src-canvas"></canvas>
<video id="feed" playsinline muted autoplay></video>

<script>
const CHARSETS = {
  dense:  '$@B%8&WM#*oahkbdpqwmZO0QLCJUYXzcvunxrjft/\\|()1{}[]?-_+~<>i!lI;:,"^`\'. ',
  blocks: '█▓▒░ ',
  minimal:'@:. '
};

let cols = 160;
let colorMode = true;
let inverted = false;
let charset = CHARSETS.dense;
let facingMode = 'user';
let stream = null;
let animId = null;
let running = false;

let targetIdx = [], charColors = [];
let prevBrightness = null;
let motionDelta = null;
let sensitivity = 8;
let numCols = 0, numRows = 0;

const feed     = document.getElementById('feed');
const srcCv    = document.getElementById('src-canvas');
const srcCtx   = srcCv.getContext('2d');
const errorOverlay = document.getElementById('error-overlay');
const btnFlip  = document.getElementById('btn-flip');

// Three.js state
let renderer, scene, camera, charMesh, dummy;
let atlasTexture, atlasCanvas, atlasCtx;
let charCellW = 32, charCellH = 64;
let charCount = 0;
let instancePositions, instanceVelocities, instanceRotations, instanceAngularVel, instancePhases;
const SPRING_K = 5.0;
const DAMPING = 0.88;
const ANGULAR_DAMPING = 0.85;
const FORCE_MULT = 4.0;
let lastTime = 0;

function brightness(r,g,b){ return 0.299*r + 0.587*g + 0.114*b; }

function buildAtlas(chars) {
  const count = chars.length;
  if (!atlasCanvas) {
    atlasCanvas = document.createElement('canvas');
    atlasCtx = atlasCanvas.getContext('2d');
  }
  atlasCanvas.width = charCellW * count;
  atlasCanvas.height = charCellH;
  atlasCtx.clearRect(0, 0, atlasCanvas.width, atlasCanvas.height);
  atlasCtx.fillStyle = '#fff';
  atlasCtx.font = `${charCellH * 0.75}px monospace`;
  atlasCtx.textBaseline = 'middle';
  atlasCtx.textAlign = 'center';
  for (let i = 0; i < count; i++) {
    atlasCtx.fillText(chars[i], charCellW * i + charCellW / 2, charCellH / 2);
  }
  if (atlasTexture) {
    atlasTexture.needsUpdate = true;
  } else {
    atlasTexture = new THREE.CanvasTexture(atlasCanvas);
    atlasTexture.minFilter = THREE.LinearFilter;
    atlasTexture.magFilter = THREE.LinearFilter;
  }
}

function initThree() {
  renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x000000);
  renderer.domElement.style.cssText = 'position:fixed;inset:0;z-index:0;display:block;';
  document.body.prepend(renderer.domElement);

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
  dummy = new THREE.Object3D();

  buildAtlas(charset);

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    prevBrightness = null;
  });
}

function rebuildMesh() {
  if (charMesh) { scene.remove(charMesh); charMesh.geometry.dispose(); charMesh.material.dispose(); }
  if (!numCols || !numRows) return;

  const barH = document.querySelector('.bar').offsetHeight;
  const viewH = window.innerHeight - barH;
  const viewW = window.innerWidth;

  const dist = 10;
  const vFov = camera.fov * Math.PI / 180;
  const worldH = 2 * Math.tan(vFov / 2) * dist;
  const worldW = worldH * (viewW / viewH);
  const cw = worldW / numCols;
  const ch = cw * 2.0;

  const gridH = numRows * ch;
  const gridW = numCols * cw;
  const neededDist = (gridH / 2) / Math.tan(vFov / 2) * 1.05;
  camera.position.set(0, 0, neededDist);
  camera.lookAt(0, 0, 0);

  const n = numCols * numRows;
  charCount = n;

  const geom = new THREE.PlaneGeometry(cw, ch);
  const mat = new THREE.ShaderMaterial({
    uniforms: {
      atlas: { value: atlasTexture },
      charLen: { value: charset.length }
    },
    vertexShader: `
      uniform float charLen;
      attribute float instanceUvOffset;
      attribute vec3 instanceColorAttr;
      varying vec2 vUv;
      varying vec3 vColor;
      void main() {
        vUv = vec2(uv.x / charLen + instanceUvOffset, uv.y);
        vColor = instanceColorAttr;
        gl_Position = projectionMatrix * modelViewMatrix * instanceMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      uniform sampler2D atlas;
      varying vec2 vUv;
      varying vec3 vColor;
      void main() {
        vec4 texel = texture2D(atlas, vUv);
        if (texel.a < 0.1) discard;
        gl_FragColor = vec4(vColor * texel.rgb, texel.a);
      }
    `,
    transparent: true,
    side: THREE.DoubleSide
  });
  charMesh = new THREE.InstancedMesh(geom, mat, n);
  charMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

  const uvOffsets = new Float32Array(n);
  charMesh.geometry.setAttribute('instanceUvOffset', new THREE.InstancedBufferAttribute(uvOffsets, 1));

  const colorAttr = new Float32Array(n * 3);
  charMesh.geometry.setAttribute('instanceColorAttr', new THREE.InstancedBufferAttribute(colorAttr, 3));
  charMesh.geometry.attributes.instanceColorAttr.setUsage(THREE.DynamicDrawUsage);

  instancePositions = new Float32Array(n * 3);
  instanceVelocities = new Float32Array(n * 3);
  instanceRotations = new Float32Array(n);
  instanceAngularVel = new Float32Array(n);
  instancePhases = new Float32Array(n);

  const startX = -(gridW - cw) / 2;
  const startY = (gridH - ch) / 2;

  for (let row = 0; row < numRows; row++) {
    for (let col = 0; col < numCols; col++) {
      const i = row * numCols + col;
      const x = startX + col * cw;
      const y = startY - row * ch;
      instancePositions[i * 3] = x;
      instancePositions[i * 3 + 1] = y;
      instancePositions[i * 3 + 2] = 0;
      instancePhases[i] = i * 0.1;

      dummy.position.set(x, y, 0);
      dummy.rotation.set(0, 0, 0);
      dummy.updateMatrix();
      charMesh.setMatrixAt(i, dummy.matrix);
    }
  }

  charMesh.userData.restPositions = new Float32Array(instancePositions);
  charMesh.instanceMatrix.needsUpdate = true;

  scene.add(charMesh);
}

function updateInstances(time, dt) {
  if (!charMesh || charCount === 0) return;

  const rest = charMesh.userData.restPositions;
  const uvAttr = charMesh.geometry.getAttribute('instanceUvOffset');
  const colorAttr = charMesh.geometry.getAttribute('instanceColorAttr');
  const charLen = charset.length;
  const sensThreshold = (21 - sensitivity) / 100;

  for (let i = 0; i < charCount; i++) {
    if (targetIdx.length > i) {
      uvAttr.array[i] = targetIdx[i] / charLen;
    }

    if (charColors.length > i * 3) {
      if (colorMode) {
        colorAttr.array[i * 3] = charColors[i * 3] / 255;
        colorAttr.array[i * 3 + 1] = charColors[i * 3 + 1] / 255;
        colorAttr.array[i * 3 + 2] = charColors[i * 3 + 2] / 255;
      } else {
        const ci = targetIdx[i] || 0;
        const br = 1 - ci / Math.max(1, charLen - 1);
        colorAttr.array[i * 3] = br;
        colorAttr.array[i * 3 + 1] = br;
        colorAttr.array[i * 3 + 2] = br;
      }
    }

    if (motionDelta && motionDelta.length > i && motionDelta[i] > sensThreshold) {
      const force = motionDelta[i] * FORCE_MULT;
      instanceVelocities[i * 3] += (Math.random() - 0.5) * 2 * force;
      instanceVelocities[i * 3 + 1] += (Math.random() - 0.5) * 2 * force;
      instanceVelocities[i * 3 + 2] += (Math.random() - 0.5) * 2 * force;
      instanceAngularVel[i] += (Math.random() - 0.5) * force * 2.0;
    }

    const restZ = Math.sin(time * 0.5 + instancePhases[i]) * 0.05;

    const rx = rest[i * 3], ry = rest[i * 3 + 1], rz = rest[i * 3 + 2] + restZ;
    const dx = instancePositions[i * 3] - rx;
    const dy = instancePositions[i * 3 + 1] - ry;
    const dz = instancePositions[i * 3 + 2] - rz;

    instanceVelocities[i * 3] += -SPRING_K * dx * dt;
    instanceVelocities[i * 3 + 1] += -SPRING_K * dy * dt;
    instanceVelocities[i * 3 + 2] += -SPRING_K * dz * dt;

    instanceVelocities[i * 3] *= DAMPING;
    instanceVelocities[i * 3 + 1] *= DAMPING;
    instanceVelocities[i * 3 + 2] *= DAMPING;

    instancePositions[i * 3] += instanceVelocities[i * 3] * dt;
    instancePositions[i * 3 + 1] += instanceVelocities[i * 3 + 1] * dt;
    instancePositions[i * 3 + 2] += instanceVelocities[i * 3 + 2] * dt;

    instanceAngularVel[i] *= ANGULAR_DAMPING;
    instanceRotations[i] += instanceAngularVel[i] * dt;

    dummy.position.set(
      instancePositions[i * 3],
      instancePositions[i * 3 + 1],
      instancePositions[i * 3 + 2]
    );
    dummy.rotation.set(0, 0, instanceRotations[i]);
    dummy.updateMatrix();
    charMesh.setMatrixAt(i, dummy.matrix);
  }

  uvAttr.needsUpdate = true;
  colorAttr.needsUpdate = true;
  charMesh.instanceMatrix.needsUpdate = true;
}

function sampleFrame() {
  const sw = feed.videoWidth, sh = feed.videoHeight;
  if (!sw || !sh) return false;

  const videoAspect = sh / sw;
  numCols = cols;
  const cw = window.innerWidth / numCols;
  const fs = cw / 0.62;
  const ch = fs * 1.25;
  const maxRows = Math.max(1, Math.floor((window.innerHeight - document.querySelector('.bar').offsetHeight) / ch));
  numRows = Math.min(maxRows, Math.max(1, Math.round(numCols * videoAspect / (ch / cw))));

  srcCv.width  = numCols;
  srcCv.height = numRows;

  // mirror front camera
  if (facingMode === 'user') {
    srcCtx.save();
    srcCtx.translate(numCols, 0);
    srcCtx.scale(-1, 1);
    srcCtx.drawImage(feed, 0, 0, numCols, numRows);
    srcCtx.restore();
  } else {
    srcCtx.drawImage(feed, 0, 0, numCols, numRows);
  }

  const data = srcCtx.getImageData(0, 0, numCols, numRows).data;
  const n = numCols * numRows;

  if (targetIdx.length !== n) {
    targetIdx  = new Int32Array(n);
    charColors = new Uint8Array(n * 3);
  }

  for (let i = 0; i < n; i++) {
    const d = i * 4;
    const r = data[d], g = data[d+1], b = data[d+2];
    let br = brightness(r,g,b) / 255;
    if (inverted) br = 1 - br;
    targetIdx[i] = Math.floor(br * (charset.length - 1));
    charColors[i*3]   = r;
    charColors[i*3+1] = g;
    charColors[i*3+2] = b;
  }

  // motion detection
  if (!prevBrightness || prevBrightness.length !== n) {
    prevBrightness = new Float32Array(n);
    motionDelta = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      prevBrightness[i] = brightness(data[i*4], data[i*4+1], data[i*4+2]) / 255;
    }
    return true;
  }

  for (let i = 0; i < n; i++) {
    const d = i * 4;
    const br = brightness(data[d], data[d+1], data[d+2]) / 255;
    motionDelta[i] = Math.abs(br - prevBrightness[i]);
    prevBrightness[i] = br;
  }

  return true;
}

function loop(timestamp) {
  animId = requestAnimationFrame(loop);
  if (!running) return;

  const time = timestamp * 0.001;
  const dt = Math.min(time - lastTime, 0.05);
  lastTime = time;

  const needsRebuild = sampleFrame();
  if (needsRebuild && (!charMesh || charCount !== numCols * numRows)) {
    rebuildMesh();
  }

  if (camera && charMesh) {
    camera.position.x = Math.sin(time * 0.15) * 0.3;
    camera.position.y = Math.cos(time * 0.1) * 0.2;
    camera.lookAt(0, 0, 0);
  }

  updateInstances(time, dt);
  renderer.render(scene, camera);
}

async function startCam() {
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  running = false;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width: { ideal: 640 } },
      audio: false
    });
    feed.srcObject = stream;
    await feed.play();
    running = true;
    const devices = await navigator.mediaDevices.enumerateDevices();
    const camCount = devices.filter(d => d.kind === 'videoinput').length;
    btnFlip.style.display = camCount > 1 ? '' : 'none';
    if (!animId) animId = requestAnimationFrame(loop);
  } catch(e) {
    errorOverlay.classList.add('visible');
    console.error(e);
  }
}

btnFlip.addEventListener('click', () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  btnFlip.textContent = facingMode === 'user' ? 'flip' : 'rear';
  startCam();
});

document.getElementById('btn-color').addEventListener('click', function() {
  colorMode = !colorMode;
  this.textContent = colorMode ? 'color' : 'mono';
  this.classList.toggle('active', colorMode);
});

document.getElementById('btn-inv').addEventListener('click', function() {
  inverted = !inverted;
  this.textContent = inverted ? 'inv!' : 'inv';
  this.classList.toggle('active', inverted);
});

document.getElementById('btn-save').addEventListener('click', () => {
  if (!renderer) return;
  const a = document.createElement('a');
  a.href = renderer.domElement.toDataURL('image/png');
  a.download = 'ascii-cam.png';
  a.click();
});

document.getElementById('sens-r').addEventListener('input', e => {
  sensitivity = parseInt(e.target.value);
  document.getElementById('sens-v').textContent = sensitivity;
});

document.getElementById('charset-sel').addEventListener('change', e => {
  charset = CHARSETS[e.target.value];
  targetIdx = [];
  prevBrightness = null;
  buildAtlas(charset);
  charCount = 0;
});

document.getElementById('cols-r').addEventListener('input', e => {
  cols = parseInt(e.target.value);
  document.getElementById('cols-v').textContent = cols;
  targetIdx = [];
  prevBrightness = null;
  charCount = 0;
});

document.addEventListener('DOMContentLoaded', () => { initThree(); startCam(); });
</script>
</body>
</html>
