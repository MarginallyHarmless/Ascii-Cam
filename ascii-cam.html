<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>ascii cam</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --border: #2a2a2a;
    --text: #c8c8c8;
    --muted: #555;
    --accent: #e8734a;
    --font: 'IBM Plex Mono', 'Courier New', monospace;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 13px;
    height: 100%;
    overflow: hidden;
  }

  /* ---------- layout ---------- */
  .shell {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 900px;
    margin: 0 auto;
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .logo {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .logo span { color: var(--accent); }

  .status {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ---------- canvas output ---------- */
  .canvas-wrap {
    flex: 1;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
  }

  #out-canvas {
    display: block;
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
  }

  .idle-msg {
    position: absolute;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-align: center;
    line-height: 1.8;
  }

  /* ---------- controls ---------- */
  .controls {
    flex-shrink: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 14px 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .ctrl-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .ctrl-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    flex: 1;
    min-width: 120px;
  }

  .ctrl-label {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .slider-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  input[type=range] {
    -webkit-appearance: none;
    flex: 1;
    height: 2px;
    background: var(--border);
    border-radius: 1px;
    outline: none;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--text);
    cursor: pointer;
  }

  input[type=range]::-webkit-slider-thumb:active {
    background: var(--accent);
  }

  .val {
    font-size: 11px;
    color: var(--text);
    min-width: 20px;
    text-align: right;
  }

  /* ---------- buttons ---------- */
  .btn-row {
    display: flex;
    gap: 8px;
  }

  .btn {
    flex: 1;
    padding: 11px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: transparent;
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s, color 0.1s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    text-align: center;
  }

  .btn:active { background: var(--border); }

  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
  }

  .btn.primary:active { background: #c85c35; }

  .btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn.small {
    flex: 0 0 auto;
    padding: 7px 12px;
    font-size: 10px;
  }

  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--font);
    font-size: 11px;
    padding: 7px 10px;
    width: 100%;
    -webkit-appearance: none;
    outline: none;
  }

  /* hidden helpers */
  #src-canvas, #feed { display: none; }
</style>
</head>
<body>

<div class="shell">

  <div class="header">
    <div class="logo">ascii<span>cam</span></div>
    <div class="status" id="status">// idle</div>
  </div>

  <div class="canvas-wrap" id="canvas-wrap">
    <div class="idle-msg" id="idle-msg">tap <span style="color:var(--accent)">start camera</span><br/>to begin</div>
    <canvas id="out-canvas"></canvas>
  </div>

  <div class="controls">

    <!-- camera + flip + color + save -->
    <div class="btn-row">
      <button class="btn primary" id="btn-cam">start camera</button>
      <button class="btn small" id="btn-flip" style="display:none;">flip</button>
      <button class="btn small" id="btn-color">mono</button>
      <button class="btn small" id="btn-save">save</button>
    </div>

    <!-- charset -->
    <div class="ctrl-row">
      <div class="ctrl-group">
        <div class="ctrl-label">charset</div>
        <select id="charset-sel">
          <option value="dense">dense — @#S%?*+;:,.</option>
          <option value="blocks">blocks — █▓▒░</option>
          <option value="minimal">minimal — @:.</option>
        </select>
      </div>
    </div>

    <!-- sliders -->
    <div class="ctrl-row">
      <div class="ctrl-group">
        <div class="ctrl-label">columns</div>
        <div class="slider-row">
          <input type="range" id="cols-r" min="30" max="140" value="72" step="2" />
          <span class="val" id="cols-v">72</span>
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">glitch rate</div>
        <div class="slider-row">
          <input type="range" id="rate-r" min="0" max="100" value="18" step="1" />
          <span class="val" id="rate-v">18</span>
        </div>
      </div>
    </div>

    <div class="ctrl-row">
      <div class="ctrl-group">
        <div class="ctrl-label">glitch range</div>
        <div class="slider-row">
          <input type="range" id="range-r" min="1" max="8" value="2" step="1" />
          <span class="val" id="range-v">2</span>
        </div>
      </div>
      <div class="ctrl-group">
        <div class="ctrl-label">invert</div>
        <div class="slider-row" style="padding-top:2px;">
          <button class="btn small" id="btn-inv" style="flex:1;">off</button>
        </div>
      </div>
    </div>

  </div>
</div>

<canvas id="src-canvas"></canvas>
<video id="feed" playsinline muted autoplay></video>

<script>
const CHARSETS = {
  dense:  '@#S%?*+;:,. ',
  blocks: '█▓▒░ ',
  minimal:'@:. '
};

let cols = 72;
let colorMode = false;
let inverted = false;
let charset = CHARSETS.dense;
let glitchRate = 18;
let glitchRange = 2;
let facingMode = 'user';
let stream = null;
let animId = null;
let running = false;

let targetIdx = [], displayIdx = [], glitchTTL = [], charColors = [];
let numCols = 0, numRows = 0;

const feed     = document.getElementById('feed');
const srcCv    = document.getElementById('src-canvas');
const srcCtx   = srcCv.getContext('2d');
const outCv    = document.getElementById('out-canvas');
const outCtx   = outCv.getContext('2d');
const statusEl = document.getElementById('status');
const idleMsg  = document.getElementById('idle-msg');
const btnCam   = document.getElementById('btn-cam');
const btnFlip  = document.getElementById('btn-flip');

function setStatus(t) { statusEl.textContent = t; }

function brightness(r,g,b){ return 0.299*r + 0.587*g + 0.114*b; }

function sampleFrame() {
  const sw = feed.videoWidth, sh = feed.videoHeight;
  if (!sw || !sh) return false;

  const aspect = sh / sw;
  numCols = cols;
  numRows = Math.max(1, Math.round(cols * aspect / 2.1));

  srcCv.width  = numCols;
  srcCv.height = numRows;

  // mirror front camera
  if (facingMode === 'user') {
    srcCtx.save();
    srcCtx.translate(numCols, 0);
    srcCtx.scale(-1, 1);
    srcCtx.drawImage(feed, 0, 0, numCols, numRows);
    srcCtx.restore();
  } else {
    srcCtx.drawImage(feed, 0, 0, numCols, numRows);
  }

  const data = srcCtx.getImageData(0, 0, numCols, numRows).data;
  const n = numCols * numRows;

  if (targetIdx.length !== n) {
    targetIdx  = new Int32Array(n);
    displayIdx = new Int32Array(n);
    glitchTTL  = new Uint8Array(n);
    charColors = new Uint8Array(n * 3);
  }

  for (let i = 0; i < n; i++) {
    const d = i * 4;
    const r = data[d], g = data[d+1], b = data[d+2];
    let br = brightness(r,g,b) / 255;
    if (inverted) br = 1 - br;
    targetIdx[i] = Math.floor(br * (charset.length - 1));
    charColors[i*3]   = r;
    charColors[i*3+1] = g;
    charColors[i*3+2] = b;
  }
  return true;
}

function applyGlitch() {
  const n = numCols * numRows;
  for (let i = 0; i < n; i++) {
    if (glitchTTL[i] > 0) {
      glitchTTL[i]--;
      if (glitchTTL[i] === 0) displayIdx[i] = targetIdx[i];
    } else {
      displayIdx[i] = targetIdx[i];
      if (Math.random() * 1000 < glitchRate) {
        const dir = Math.random() < 0.5 ? 1 : -1;
        const steps = 1 + Math.floor(Math.random() * glitchRange);
        let ni = targetIdx[i] + dir * steps;
        ni = Math.max(0, Math.min(charset.length - 1, ni));
        displayIdx[i] = ni;
        glitchTTL[i] = 1 + Math.floor(Math.random() * 4);
      }
    }
  }
}

function drawFrame() {
  const fs = 7;
  const cw = fs * 0.62;
  const ch = fs * 1.25;
  const W = Math.round(numCols * cw);
  const H = Math.round(numRows * ch);

  if (outCv.width !== W || outCv.height !== H) {
    outCv.width = W; outCv.height = H;
  }

  outCtx.fillStyle = '#000';
  outCtx.fillRect(0, 0, W, H);
  outCtx.font = `${fs}px monospace`;
  outCtx.textBaseline = 'top';

  const cs = charset;
  for (let row = 0; row < numRows; row++) {
    for (let col = 0; col < numCols; col++) {
      const i = row * numCols + col;
      const ci = displayIdx[i];
      const ch_char = cs[ci];
      if (!ch_char || ch_char === ' ') continue;

      const glitching = glitchTTL[i] > 0;
      if (colorMode) {
        const r = charColors[i*3], g = charColors[i*3+1], b = charColors[i*3+2];
        outCtx.fillStyle = glitching
          ? `rgb(${Math.min(255,r+50)},${g},${b})`
          : `rgb(${r},${g},${b})`;
      } else {
        const br = 1 - ci / (cs.length - 1);
        const lv = Math.round(br * 255);
        outCtx.fillStyle = glitching
          ? `rgb(${Math.min(255,lv+70)},${lv},${lv})`
          : `rgb(${lv},${lv},${lv})`;
      }
      outCtx.fillText(ch_char, col * cw, row * ch);
    }
  }
}

function loop() {
  animId = requestAnimationFrame(loop);
  if (!running) return;
  if (sampleFrame()) { applyGlitch(); drawFrame(); }
}

async function startCam() {
  if (stream) stopCam();
  setStatus('// requesting camera…');
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: facingMode }, width: { ideal: 640 } },
      audio: false
    });
    feed.srcObject = stream;
    await feed.play();
    running = true;
    idleMsg.style.display = 'none';
    outCv.style.display = 'block';
    btnCam.textContent = 'stop';
    btnCam.classList.remove('primary');
    // only show flip if device has more than one camera
    const devices = await navigator.mediaDevices.enumerateDevices();
    const camCount = devices.filter(d => d.kind === 'videoinput').length;
    btnFlip.style.display = camCount > 1 ? '' : 'none';
    setStatus('// live · ' + (camCount > 1 ? facingMode : 'webcam'));
    if (!animId) loop();
  } catch(e) {
    setStatus('// camera denied');
    console.error(e);
  }
}

function stopCam() {
  running = false;
  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
  feed.srcObject = null;
  targetIdx = []; displayIdx = []; glitchTTL = []; charColors = [];
  outCv.style.display = 'none';
  idleMsg.style.display = '';
  btnCam.textContent = 'start camera';
  btnCam.classList.add('primary');
  btnFlip.style.display = 'none';
  setStatus('// idle');
}

btnCam.addEventListener('click', () => {
  if (running) stopCam(); else startCam();
});

btnFlip.addEventListener('click', () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  btnFlip.textContent = facingMode === 'user' ? 'flip' : 'rear';
  if (running) startCam();
});

document.getElementById('btn-color').addEventListener('click', function() {
  colorMode = !colorMode;
  this.textContent = colorMode ? 'color' : 'mono';
  this.classList.toggle('active', colorMode);
});

document.getElementById('btn-inv').addEventListener('click', function() {
  inverted = !inverted;
  this.textContent = inverted ? 'on' : 'off';
  this.classList.toggle('active', inverted);
});

document.getElementById('btn-save').addEventListener('click', () => {
  if (!outCv.width) return;
  const a = document.createElement('a');
  a.href = outCv.toDataURL('image/png');
  a.download = 'ascii-cam.png';
  a.click();
});

document.getElementById('charset-sel').addEventListener('change', e => {
  charset = CHARSETS[e.target.value];
  targetIdx = [];
});

document.getElementById('cols-r').addEventListener('input', e => {
  cols = parseInt(e.target.value);
  document.getElementById('cols-v').textContent = cols;
  targetIdx = [];
});

document.getElementById('rate-r').addEventListener('input', e => {
  glitchRate = parseInt(e.target.value);
  document.getElementById('rate-v').textContent = glitchRate;
});

document.getElementById('range-r').addEventListener('input', e => {
  glitchRange = parseInt(e.target.value);
  document.getElementById('range-v').textContent = glitchRange;
});
</script>
</body>
</html>
